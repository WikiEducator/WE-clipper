<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 380px; font-family: sans-serif; padding: 12px; margin: 0; box-sizing: border-box; }
    label { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 4px; text-transform: uppercase; }
    input[type="text"], textarea { width: 100%; padding: 6px; box-sizing: border-box; margin-bottom: 12px; font-family: sans-serif; font-size: 13px; border: 1px solid #ccc; border-radius: 3px; }
    textarea { height: 80px; resize: vertical; }
    button { width: 100%; padding: 10px; background: #36c; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 14px; }
    button:hover { background: #4477dd; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    input:disabled { background: #f5f5f5; color: #888; }
    #status { font-size: 12px; color: #666; margin-top: 10px; text-align: center; min-height: 15px; }
    #selected-tags { margin-bottom: 6px; }
    .tag-pill { display: inline-flex; align-items: center; background: #e2f0fe; color: #1a73e8; padding: 4px 8px; border-radius: 12px; font-size: 12px; margin-right: 6px; margin-bottom: 6px; cursor: pointer; border: 1px solid #c2e0ff; }
    .tag-pill:hover { background: #d2e3fc; }
    #tag-suggestions { font-size: 11px; color: #666; margin-bottom: 12px; min-height: 18px; }
    .suggestion-chip { display: inline-block; background: #f1f3f4; padding: 3px 6px; border-radius: 4px; margin-right: 4px; cursor: pointer; }
    .suggestion-chip:hover { background: #e8eaed; }
  </style>
</head>
<body>
  <label for="title">Title</label>
  <input type="text" id="title" placeholder="Loading page title...">

  <label for="description">Description / Snippet</label>
  <textarea id="description" placeholder="Loading page snippet..."></textarea>

  <label>Tags</label>
  <div id="selected-tags"></div>
  <input type="text" id="tag-input" placeholder="Type tag and press Enter...">
  <div id="tag-suggestions"></div>

  <label id="targetLabel" for="targetPage" style="text-transform: none;">User Subpage Name</label>
  <input type="text" id="targetPage" value="Clippings" disabled>
  
  <button id="clipBtn" disabled>Clip to Wiki</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
